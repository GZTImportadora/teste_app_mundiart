<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>App Mundiart - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
</head>

<body>

    <div class="login-container">

        <div class="card login-card">

            <div class="login-header">

                <div class="logo">
                    <img src="icon-192.png" alt="" class="login-ico">
                    Conecta Mundiart
                </div>

                <div class="subtitle">
                    Acesso restrito
                </div>

            </div>

            <div class="card-body px-4 pb-4">

                <form id="loginForm">

                    <div class="mb-3">

                        <label class="form-label">Usuário</label>

                        <div class="input-group">

                            <span class="input-group-text">
                                <i class="fa fa-user"></i>
                            </span>

                            <input type="text" id="anime" class="form-control" placeholder="Digite seu usuário"
                                required>

                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">Senha</label>

                        <div class="input-group">

                            <span class="input-group-text">
                                <i class="fa fa-lock"></i>
                            </span>

                            <input type="password" id="fox" class="form-control" placeholder="Digite sua senha"
                                required>

                        </div>

                    </div>

                    <button class="btn btn-primary w-100 btn-login">

                        <i class="fa fa-sign-in-alt me-2"></i>
                        Entrar

                    </button>

                    <div id="erro" class="text-danger text-center mt-3"></div>

                </form>

            </div>

        </div>

        <div class="footer-login">
            Sistema interno • Uso restrito
        </div>

    </div>

    <script src="js/auth.js"></script>

</body>

</html>
