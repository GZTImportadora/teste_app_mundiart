<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cálculo de Margem</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="menu.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
</head>

<body>

    <div class="header">
        <i class="fa fa-th-large"></i> Menu Principal
    </div>

    <div class="tiles">

        <div class="tile tile-margem" onclick="abrirMargem()">
            <i class="fa-solid fa-chart-line"></i>
            Cálculo de Margem
        </div>

        <div class="tile tile-cotacao" onclick="abrirCotacao()">
            <i class="fa-solid fa-file-invoice-dollar"></i>
            Cotação de Produtos
        </div>

        <div class="tile tile-sair" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
            Sair
        </div>

    </div>

    <div class="footer">
        Sistema interno • Uso restrito
    </div>

    <script>

        function abrirMargem() {
            window.location.href = "margem.html";
        }

        function abrirCotacao() {
            window.location.href = "cotacao.html";
        }

        function logout() {

            localStorage.removeItem("token");

            window.location.href = "login.html";

        }

    </script>

</body>

</html>
