<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cotação de Produtos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container py-4">
        <a href="menu.html" class="btn-voltar">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
    </div>

    <div class="container my-4">

        <div class="card shadow">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                Cotação de Importação
                <i class="fa fa-gear" style="cursor:pointer;" onclick="abrirParametros()"></i>
            </div>

            <div class="card-body">
                <div class="row g-3">

                    <div class="col-md-4">
                        <label>Custo USD</label>
                        <input type="number" id="fob" class="form-control input-amarelo">
                    </div>

                    <div class="col-md-4">
                        <label>CBM caixa</label>
                        <input type="number" id="cbmCaixa" class="form-control input-amarelo">
                    </div>

                    <div class="col-md-4">
                        <label>Peças por caixa</label>
                        <input type="number" id="pecasCaixa" class="form-control input-amarelo">
                    </div>

                    <div class="col-md-4">
                        <label>Porto</label>
                        <select id="porto" class="form-select">
                            <option value="China 40HC" data-cbm="69">China 40HC</option>
                            <option value="China 20" data-cbm="27">China 20</option>
                            <option value="China 40" data-cbm="60">China 40</option>
                            <option value="China NOR" data-cbm="55">China NOR</option>
                            <option value="Montevideu" data-cbm="69">Montevideu</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label>USD frete</label>
                        <input type="number" id="frete" class="form-control input-amarelo">
                    </div>
                    
                    <hr>

                    <div class="col-md-3">
                        <label>II</label>
                        <input type="number" id="ii" class="form-control input-verde">
                    </div>

                    <div class="col-md-3">
                        <label>IPI</label>
                        <input type="number" id="ipi" class="form-control input-verde">
                    </div>

                    <div class="col-md-3">
                        <label>% agente</label>
                        <input type="number" id="agente" class="form-control input-verde">
                    </div>

                    <div class="col-md-3">
                        <label>Margem</label>
                        <input type="number" id="margem" class="form-control input-verde">
                    </div>

                    <div class="col-md-3">
                        <label>Subst. Tributária</label>
                        <input type="text" id="st" class="form-control input-verde" placeholder="Ex: 2 ou 2%">
                    </div>

                    <div class="col-md-3">
                        <label>USD despacho</label>
                        <input type="number" step="0.01" id="usdDespacho" class="form-control input-verde">
                    </div>

                    <div class="col-md-3">
                        <label>USD 30%</label>
                        <input type="number" step="0.01" id="usd30" class="form-control input-verde">
                    </div>

                    <div class="col-md-3">
                        <label>USD 70%</label>
                        <input type="number" step="0.01" id="usd70" class="form-control input-verde">
                    </div>

                </div>

                <div class="mt-4">
                    <button onclick="calcular()" class="btn btn-primary w-100">
                        Calcular Cotação
                    </button>
                </div>
            </div>
        </div>

        <div class="card shadow mt-4">
            <div class="card-header">
                Resultado
            </div>
            <div class="card-body">
                <table class="table table-bordered">
                    <tbody id="resultado"></tbody>
                </table>
            </div>
        </div>

    </div>

    <div class="modal fade" id="modalParametros" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Parâmetros</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="row g-3">

                        <div class="col-md-3">
                            <label>PIS</label>
                            <input type="number" step="0.0001" id="p_pis" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>COFINS</label>
                            <input type="number" step="0.0001" id="p_cofins" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>ICMS Importação</label>
                            <input type="number" step="0.01" id="p_icmsImportacao" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>ICMS Venda</label>
                            <input type="number" step="0.01" id="p_icmsVenda" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>CPMF</label>
                            <input type="number" step="0.0001" id="p_cpmf" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>Armazenagem %</label>
                            <input type="number" step="0.0001" id="p_armazenagemPct" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>Desembaraço</label>
                            <input type="number" id="p_desembaraco" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>AFRMM %</label>
                            <input type="number" step="0.01" id="p_afrmmPct" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>Transporte Interno</label>
                            <input type="number" id="p_transporteInterno" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>THC BL</label>
                            <input type="number" id="p_thcBL" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>Desova</label>
                            <input type="number" id="p_desova" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>Desconsolidação</label>
                            <input type="number" id="p_desconsolidacao" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>Emissão DI</label>
                            <input type="number" id="p_emissaoDI" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>Tags/Etiquetas</label>
                            <input type="number" id="p_tagsEtiquetas" class="form-control">
                        </div>

                    </div>

                    <hr>

                    <div class="row g-3">

                        <div class="col-md-3">
                            <label>II</label>
                            <input type="number" id="p_ii" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>IPI</label>
                            <input type="number" id="p_ipi" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>% agente</label>
                            <input type="number" id="p_agente" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>Margem</label>
                            <input type="number" id="p_margem" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>USD despacho</label>
                            <input type="number" step="0.01" id="p_usdDespacho" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>USD 30%</label>
                            <input type="number" step="0.01" id="p_usd30" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>USD 70%</label>
                            <input type="number" step="0.01" id="p_usd70" class="form-control">
                        </div>

                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="salvarParametros()">Salvar</button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="cotacao.js"></script>

</body>

</html>
